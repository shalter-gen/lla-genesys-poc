<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agents Disconnections</title>
    <link rel="stylesheet" href="agents-disconnections.css">
    <link rel="stylesheet" href="../Common/admin-nav.css">
    <script src="https://sdk-cdn.mypurecloud.com/javascript/latest/purecloud-platform-client-v2.min.js"></script>
</head>

<body>
    <div id="content">
        <div class="header-container">
            <div class="logo-title-group">
                <div id="hamburgerMenu" class="hamburger-icon">
                    <div class="hamburger-line"></div>
                    <div class="hamburger-line"></div>
                    <div class="hamburger-line"></div>
                </div>
                <img src="../Common/LIFE0020-MasterLogo-White-RGB.png" alt="Lifeline" class="header-logo"
                    id="adminLogo">
                </div>
                <h1>Agents Disconnections</h1>
            </div>
        </div>
        <div id="timeframeSelector">
            <label for="timeframe">Select Timeframe:</label>
            <select id="timeframe">
                <option value="12hours">Past 12 Hours</option>
                <option value="1day">Past 1 Day</option>
                <option value="1week">Past 1 Week</option>
                <option value="2weeks">Past 2 Weeks</option>
                <option value="30days">Past 30 Days</option>
            </select>
        </div>
        <div class="button-container">
            <button id="refreshButton">Refresh</button>
        </div>
        <!-- Keep existing headers but ensure Session Duration is last -->
        <table id="agentsDisconnectionsTable">
            <thead>
                <tr>
                    <th>User Name</th>
                    <th>Division</th>
                    <th>Status</th>
                    <th>Last Login</th>
                    <!-- Existing metrics columns remain unchanged -->
                    <th>Handled</th>
                    <th>Not Responded</th>
                    <th>Avg ACW</th>
                    <th>Sessions</th>
                    <th>Min Session Duration</th>
                    <th>Max Session Duration</th>
                    <th>Avg Session Duration</th>
                    <th>Total Sessions Duration</th>
                    <th>Disconnects</th>
                    <th>Avg Disconnects per Session</th>
                    <th>Min DC Duration</th>
                    <th>Max DC Duration</th>
                    <th>Avg DC Duration</th>
                </tr>
            </thead>
            <tbody id="agentsDisconnectionsBody"></tbody>
        </table>
        <script>
            const CLIENT_ID = '684c6d2c-285b-4597-a00e-3c71268bf2ce';
            const TOKEN_KEY_NAME = 'LLA_Admin_Assist_Access_Token';
        </script>
    </div>
    <script src="../Common/authentication-pkce.js"></script>
    <script src="../Common/token.js"></script>
    <script src="agents-disconnections.js"></script>
    <script src="../Common/admin-nav.js"></script>

</body>

</html>
