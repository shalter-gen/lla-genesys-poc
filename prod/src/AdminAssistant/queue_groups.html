<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Queue Group Members Management</title>
  <link rel="stylesheet" href="queue_groups.css">
  <link rel="stylesheet" href="../Common/admin-nav.css">
  <script src="https://sdk-cdn.mypurecloud.com/javascript/latest/purecloud-platform-client-v2.min.js"></script>
</head>

<body>
  <div id="loadingMessage">Loading...</div>
  <div id="content">
    <div class="header-container">
      <div class="logo-title-group">
        <div id="hamburgerMenu" class="hamburger-icon">
            <div class="hamburger-line"></div>
            <div class="hamburger-line"></div>
            <div class="hamburger-line"></div>
        </div>
        <img src="../Common/LIFE0020-MasterLogo-White-RGB.png" alt="Lifeline" class="header-logo" id="adminLogo">


        <h1>Queue Group Members Management</h1>
      </div>
    </div>
    
    <!-- Queue Selection Dropdown -->
    <div class="queue-selector-container">
      <div class="queue-selector">
        <label for="queueFilter">Filter Queues:</label>
        <input type="text" id="queueFilter" placeholder="Type to filter queues...">
        <label for="queueSelect">Select Queue:</label>
        <select id="queueSelect" size="10">
          <option value="">-- Select a Queue --</option>
        </select>
      </div>
    </div>
    
    <!-- Action Buttons -->
    <div class="button-container" id="buttonContainer" style="display: none;">
      <button id="refreshButton">Refresh</button>
      <button id="activateButton">Activate Users</button>
      <button id="deactivateButton">Deactivate Users</button>
    </div>
    
    <!-- Groups Section -->
    <div id="groupsSection" style="display: none;">
      <h2>Groups and Adhoc Members</h2>
      <div id="groupsList" class="groups-list">
        <!-- Groups will be dynamically populated -->
      </div>
      <div class="group-item adhoc-item">
        <input type="checkbox" id="adhocMembersCheckbox">
        <label for="adhocMembersCheckbox">Adhoc Members</label>
        <span class="group-count" id="adhocCount">(0 active, 0 inactive)</span>
      </div>
    </div>
    
    <!-- Users Tables -->
    <div id="usersSection" style="display: none;">
      <div class="users-container">
        <!-- Active Users Table -->
        <div class="users-table-wrapper">
          <h2>Active Users</h2>
          <table id="activeUsersTable">
            <thead>
              <tr>
                <th><input type="checkbox" id="selectAllActive">Select All</th>
                <th>Email</th>
                <th>Name</th>
                <th>Groups</th>
              </tr>
            </thead>
            <tbody>
              <!-- Active users will be dynamically populated -->
            </tbody>
          </table>
        </div>
        
        <!-- Inactive Users Table -->
        <div class="users-table-wrapper">
          <h2>Inactive Users</h2>
          <table id="inactiveUsersTable">
            <thead>
              <tr>
                <th><input type="checkbox" id="selectAllInactive">Select All</th>
                <th>Email</th>
                <th>Name</th>
                <th>Groups</th>
              </tr>
            </thead>
            <tbody>
              <!-- Inactive users will be dynamically populated -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
  
    <script>
      const CLIENT_ID = '684c6d2c-285b-4597-a00e-3c71268bf2ce';
      const TOKEN_KEY_NAME = 'LLA_Admin_Assist_Access_Token';
    </script>
  <script src="../Common/authentication-pkce.js"></script>
  <script src="../Common/token.js"></script>
  <script src="queue_groups.js"></script>
  <script src="../Common/admin-nav.js"></script>
</body>

</html>
