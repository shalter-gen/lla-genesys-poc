<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create WebRTC Phones for Users</title>
  <link rel="stylesheet" href="user_phone.css">
  <link rel="stylesheet" href="../Common/admin-nav.css">
  <script src="https://sdk-cdn.mypurecloud.com/javascript/latest/purecloud-platform-client-v2.min.js"></script>
</head>

<body>
  <div id="loadingMessage">Loading...</div>
  <div id="content">
    <div class="header-container">
      <div class="logo-title-group">
      <div id="hamburgerMenu" class="hamburger-icon">
          <div class="hamburger-line"></div>
          <div class="hamburger-line"></div>
          <div class="hamburger-line"></div>
      </div>
        <img src="../Common/LIFE0020-MasterLogo-White-RGB.png" alt="Lifeline" class="header-logo" id="adminLogo">


        <h1>Create WebRTC Phones for Users</h1>
      </div>
    </div>
    
    <!-- Group Selection and Action -->
    <div class="group-selector-container">
      <div class="group-selector">
        <label for="groupFilter">Filter Groups:</label>
        <input type="text" id="groupFilter" placeholder="Type to filter groups...">
        <label for="groupSelect">Select Group:</label>
        <select id="groupSelect" size="10">
          <option value="">-- Select a Group --</option>
        </select>
      </div>
      <button id="createPhonesButton" disabled>Create Phones</button>
    </div>
    
    <!-- Users Without WebRTC Phone -->
    <div id="usersSection" style="display: none;">
      <h2>Users Without WebRTC Phone</h2>
      <div class="select-all-container">
        <input type="checkbox" id="selectAllUsers">
        <label for="selectAllUsers">Select All</label>
      </div>
      <table id="usersTable">
        <thead>
          <tr>
            <th>Select</th>
            <th>Email</th>
            <th>Name</th>
            <th>Current Phone</th>
          </tr>
        </thead>
        <tbody>
          <!-- Users will be dynamically populated -->
        </tbody>
      </table>
    </div>
  </div>
    <script>
      const CLIENT_ID = '684c6d2c-285b-4597-a00e-3c71268bf2ce';
      const TOKEN_KEY_NAME = 'LLA_Admin_Assist_Access_Token';
    </script>  
  <script src="../Common/token.js"></script>
  <script src="user_phone.js"></script>
  <script src="../Common/admin-nav.js"></script>
</body>

</html>
